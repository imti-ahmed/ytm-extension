<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YTM Now Playing</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>🎵 YTM Now Playing</h1>

    <!-- Auth Section -->
    <div id="auth-section">
      <p class="subtitle">Sign in to start tracking</p>
      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Password" />
      <div class="btn-row">
        <button id="sign-in-btn">Sign In</button>
        <button id="sign-up-btn" class="secondary">Sign Up</button>
      </div>
      <p id="auth-error" class="error"></p>
    </div>

    <!-- Status Section (shown when logged in) -->
    <div id="status-section" style="display: none;">
      <p class="user-email" id="user-email"></p>
      <div class="status-card" id="status-card">
        <p class="status-text">Waiting for YouTube Music...</p>
      </div>
      <button id="sign-out-btn" class="danger">Sign Out</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
